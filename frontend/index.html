<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>可信数据空间密钥管理 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>可信数据空间密钥管理与加密演示系统</h1>
        <p>手动注册 Connector，管理 Connector 本地文件目录，并按属性策略发布和下载文件。</p>
      </div>
      <div class="topbar-actions">
        <button id="initBtn" class="secondary">重新初始化</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel overview">
        <div class="panel-head">
          <h2>系统总览</h2>
          <button class="icon-btn" data-action="refresh">刷新</button>
        </div>
        <div id="statusGrid" class="status-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Connector 管理</h2>
          <button id="registerBtn">新增 Connector</button>
        </div>
        <div class="form-grid">
          <label>
            名称
            <input id="connectorName" value="Connector A" />
          </label>
          <label>
            角色
            <select id="connectorRole">
              <option value="PROVIDER">PROVIDER</option>
              <option value="CONSUMER">CONSUMER</option>
            </select>
          </label>
          <label class="wide">
            属性
            <input id="connectorAttrs" value="department=rd,role=researcher" />
          </label>
        </div>
        <div id="connectorsList" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Connector 本地文件目录</h2>
          <button id="importFileBtn">导入到目录</button>
        </div>
        <div class="form-grid">
          <label>
            Connector
            <select id="fileOwnerSelect"></select>
          </label>
          <label>
            本地文件
            <input id="fileInput" type="file" />
          </label>
        </div>
        <div id="connectorFilesList" class="list"></div>
        <div id="fileImportResult" class="result"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>从 Connector 发布文件到系统</h2>
          <button id="publishFileBtn">发布文件</button>
        </div>
        <div class="form-grid">
          <label>
            Provider
            <select id="publishProviderSelect"></select>
          </label>
          <label>
            Provider 目录文件
            <select id="connectorFileSelect"></select>
          </label>
          <label class="wide">
            访问策略
            <input id="filePolicyInput" value="department=rd AND role=researcher" />
          </label>
        </div>
        <div id="filePublishResult" class="result"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>系统文件下载</h2>
          <button id="fileDownloadBtn">按规则下载文件</button>
        </div>
        <div class="form-grid">
          <label>
            Consumer
            <select id="consumerSelect"></select>
          </label>
          <label>
            系统资源
            <select id="resourceSelect"></select>
          </label>
        </div>
        <div class="action-row">
          <button id="setSalesBtn" class="secondary">将 Consumer 改为销售属性</button>
          <button id="setRdBtn" class="secondary">恢复研发属性</button>
        </div>
        <div id="downloadResult" class="result"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>密钥管理</h2>
          <button id="rekeyBtn">资源重加密</button>
        </div>
        <div class="action-row">
          <button id="revokeDekBtn" class="secondary">撤销当前资源 DEK</button>
        </div>
        <div id="keysList" class="table-wrap"></div>
      </section>

      <section class="panel logs">
        <div class="panel-head">
          <h2>流程日志</h2>
          <button class="icon-btn" data-action="refresh">刷新</button>
        </div>
        <div id="logsList" class="logs-list"></div>
      </section>
    </main>

    <div id="notifyOverlay" class="notify-overlay" hidden>
      <div id="notifyDialog" class="notify-dialog" role="alertdialog" aria-modal="true">
        <div class="notify-head">
          <span id="notifyBadge" class="notify-badge"></span>
          <h2 id="notifyTitle"></h2>
        </div>
        <p id="notifyMessage"></p>
        <pre id="notifyDetails" class="notify-details"></pre>
        <div class="notify-actions">
          <button id="notifyCloseBtn">知道了</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
